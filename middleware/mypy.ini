[mypy]
python_version = 3.11
files = .
exclude = (?x)(^tests/|^__pycache__/|^uploads/|^outputs/|^temp/|^node_modules/|^\.venv/)
namespace_packages = True
explicit_package_bases = True
ignore_missing_imports = True
follow_imports = silent
show_error_codes = True
pretty = False
implicit_optional = True
allow_redefinition = True
disable_error_code = var-annotated, import-untyped, no-redef, annotation-unchecked

[mypy-env_fixer]
ignore_errors = True

[mypy-rule_processor]
ignore_errors = True

[mypy-term_extractor]
ignore_errors = True

[mypy-server.translation_worker]
ignore_errors = True

[mypy-murasaki_flow_v2.*]
ignore_errors = True

[mypy-murasaki_translator.main]
ignore_errors = True

[mypy-murasaki_translator.core.engine]
ignore_errors = True

[mypy-murasaki_translator.documents.epub]
disable_error_code = union-attr, arg-type, misc, index

[mypy-murasaki_translator.utils.epub_loader]
ignore_errors = True
